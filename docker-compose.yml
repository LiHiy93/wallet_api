services:
  postgres:
    image: postgres:16-alpine
    container_name: wallet-api-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-wallet_api}
      POSTGRES_USER: ${POSTGRES_USER:-wallet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wallet}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wallet} -d ${POSTGRES_DB:-wallet_api}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: wallet-api-app
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "18080:8080"
    restart: unless-stopped

volumes:
  postgres_data:
